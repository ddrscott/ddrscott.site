{% extends "base.html" %}

{% block extrahead %}
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:site" content="{{ page.canonical_url }}" />
<meta name="twitter:creator" content="@_ddrscott_" />
{% if page and page.meta %}
  {% if page.meta.title %}
<meta property="og:title" content="{{ page.meta.title }}" />
  {% endif %}
  {% if page.meta.image %}
<meta name="twitter:image" content="{{ page.meta.image }}" />
<meta property="og:image" content="{{ page.meta.image }}" />
  {% endif %}
  {% if page.meta.description %}
<meta property="og:description" content="{{ page.meta.description }}" />
<meta name="description" content="{{ page.meta.description }}">
  {% endif %}
{% endif %}
<style>
  .sponsor-sidebar {
    margin: 1.6rem 0.6rem 1rem 0.6rem;
    padding-top: 1rem;
    border-top: 1px solid var(--md-default-fg-color--lightest);
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.5rem;
  }
  .sponsor-sidebar__copy {
    font-size: 0.7rem;
    color: var(--md-default-fg-color--light);
    margin: 0;
    line-height: 1.3;
  }
  .sponsor-sidebar iframe {
    border: 0;
    border-radius: 6px;
    width: 114px;
    height: 32px;
    display: block;
  }
  .sponsor-header-button {
    display: none;
    margin: 0 0.4rem;
    align-self: center;
  }
  .sponsor-header-button iframe {
    border: 0;
    border-radius: 6px;
    width: 114px;
    height: 32px;
    display: block;
  }
  @media screen and (max-width: 76.1875em) {
    .sponsor-sidebar { display: none; }
    .sponsor-header-button { display: flex; }
  }
</style>
{% endblock %}

{% block scripts %}
    <!-- Start of Rocket.Chat Livechat Script -->
    <script type="text/javascript">
    (function(w, d, s, u) {
        w.RocketChat = function(c) { w.RocketChat._.push(c) }; w.RocketChat._ = []; w.RocketChat.url = u;
        var h = d.getElementsByTagName(s)[0], j = d.createElement(s);
        j.async = true; j.src = 'https://chat.chickencow.org/livechat/rocketchat-livechat.min.js?_=201903270000';
        h.parentNode.insertBefore(j, h);
    })(window, document, 'script', 'https://chat.chickencow.org/livechat');
    </script>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9C68DD62WS"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-9C68DD62WS');
    </script>
    <script defer data-domain="ddrscott.github.io" src="https://plausible.dataturd.com/js/script.outbound-links.js"></script>

    <script>
    document.addEventListener("DOMContentLoaded", function() {
      var navInner = document.querySelector(".md-sidebar--primary .md-sidebar__inner");
      if (navInner) {
        var sidebar = document.createElement("div");
        sidebar.className = "sponsor-sidebar";
        sidebar.innerHTML =
          '<p class="sponsor-sidebar__copy">Like this? Motivate me to write more!</p>' +
          '<iframe src="https://github.com/sponsors/ddrscott/button" title="Sponsor ddrscott" loading="lazy"></iframe>';
        navInner.appendChild(sidebar);
      }

      var headerInner = document.querySelector(".md-header__inner");
      if (headerInner) {
        var btn = document.createElement("div");
        btn.className = "sponsor-header-button";
        btn.innerHTML = '<iframe src="https://github.com/sponsors/ddrscott/button" title="Sponsor ddrscott" loading="lazy"></iframe>';
        headerInner.appendChild(btn);
      }
    });
    </script>
{% endblock %}
